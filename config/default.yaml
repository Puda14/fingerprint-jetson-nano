# ===========================================================================
# Fingerprint Jetson Nano Worker — Default Pipeline Configuration
# ===========================================================================
# These are the default configuration parameters.
# Can be overridden using WORKER_* environment variables.

# ---------------------------------------------------------------------------
# Verification / Identification
# ---------------------------------------------------------------------------
verification:
  verify_threshold: 0.55 # cosine similarity threshold for 1:1 verify
  verify_margin: 0.02 # required gap vs best non-target score to accept 1:1 verify
  identify_threshold: 0.50 # cosine similarity threshold for 1:N identify
  identify_top_k: 5 # max candidates returned in identify
  max_failed_attempts: 3 # lock after N consecutive failed attempts
  cooldown_seconds: 30 # seconds before lock status resets

# ---------------------------------------------------------------------------
# Image Quality Control
# ---------------------------------------------------------------------------
quality:
  min_quality_enroll: 40 # minimum NFIQ quality during enrollment (0-100)
  min_minutiae_count: 12 # reject images with fewer minutiae than this threshold

# ---------------------------------------------------------------------------
# FAISS / KNN Index
# ---------------------------------------------------------------------------
index:
  knn_k: 16 # number of neighbors in graph builder
  faiss_nprobe: 8 # number of Voronoi cells to probe (IVF index)

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model:
  model_path: "models/mdgtv2_fp16.engine"
  embedding_dim: 512
  image_width: 192
  image_height: 192
  batch_size: 1

# ---------------------------------------------------------------------------
# Image Preprocessing
# ---------------------------------------------------------------------------
preprocessing:
  clahe_clip: 2.5 # CLAHE clip level (0-8)
  clahe_grid: 8 # CLAHE grid size (pixels)
  extractor: "cn" # minutiae extraction method: "cn" | "fingernet"

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
database:
  url: "sqlite+aiosqlite:///data/fingerprint.db"
  wal_mode: true
  busy_timeout_ms: 5000

# ---------------------------------------------------------------------------
# API Server
# ---------------------------------------------------------------------------
api:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:8080"

# ---------------------------------------------------------------------------
# WebSocket
# ---------------------------------------------------------------------------
websocket:
  ping_interval: 30
  ping_timeout: 10

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: "logs/worker.log"
  max_bytes: 10485760 # 10 MB
  backup_count: 5

# ---------------------------------------------------------------------------
# Device Identification
# ---------------------------------------------------------------------------
device:
  id: "JETSON-001"
  name: "Fingerprint Jetson Nano Worker"
  location: "Main Entrance"
